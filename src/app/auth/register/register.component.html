<app-loader [loading]="loading" />

<div class="auth-page">

  <div class="auth-brand">
    <div class="brand-content">
      <div class="brand-logo">⚡</div>
      <h1>Admin Panel</h1>
      <p>Create your admin account and start managing your store today.</p>
      <div class="brand-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-box">

      <div class="auth-header">
        <h2>Create Account 🚀</h2>
        <p>Fill in the details to get started</p>
      </div>

      <div class="alert alert-success" *ngIf="success">
        ✅ {{ success }} <a routerLink="/auth/login">Login now →</a>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!success">

        <div class="field" [class.has-error]="form.get('name')?.touched && form.get('name')?.invalid">
          <label>Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </span>
            <input formControlName="name" placeholder="John Doe" autocomplete="name" />
          </div>
          <span class="err-msg" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">Name is required</span>
        </div>

        <div class="field" [class.has-error]="form.get('email')?.touched && form.get('email')?.invalid">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </span>
            <input type="email" formControlName="email" placeholder="admin@example.com" autocomplete="email" />
          </div>
          <span class="err-msg" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Please enter a valid email</span>
        </div>

        <div class="field" [class.has-error]="form.get('password')?.touched && form.get('password')?.invalid">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </span>
            <input [type]="showPass ? 'text' : 'password'" formControlName="password" placeholder="Min 6 characters" autocomplete="new-password" />
            <button type="button" class="toggle-pass" (click)="showPass = !showPass">
              <svg *ngIf="!showPass" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg *ngIf="showPass" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <span class="err-msg" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">Minimum 6 characters required</span>
        </div>

        <div class="alert alert-error" *ngIf="error">⚠️ {{ error }}</div>

        <button type="submit" class="btn-submit" [disabled]="loading">
          <span *ngIf="!loading">Create Account</span>
          <span *ngIf="loading" class="btn-spinner"></span>
        </button>

      </form>

      <p class="auth-switch">Already have an account? <a routerLink="/auth/login">Sign in</a></p>

    </div>
  </div>

</div>
